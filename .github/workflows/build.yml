name: Build and Package

on:
  push:
    branches: [master, main]
    tags:
      - 'v*'
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  PRODUCT_NAME: WindowSwitcher
  MACOS_DEPLOYMENT_TARGET: '14.0'

jobs:
  build:
    name: Build macOS App
    runs-on: macos-14
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      - name: Show Xcode version
        run: xcodebuild -version
      
      - name: Show project structure
        run: |
          echo "=== Project Structure ==="
          ls -la
          echo "=== Package.swift ==="
          cat Package.swift
      
      - name: Build with Swift Package Manager
        run: |
          swift build -c release
      
      - name: Create App Bundle Structure
        run: |
          mkdir -p "artifacts/${{ env.PRODUCT_NAME }}.app/Contents/MacOS"
          mkdir -p "artifacts/${{ env.PRODUCT_NAME }}.app/Contents/Resources"
          
          # Copy executable
          cp ".build/release/${{ env.PRODUCT_NAME }}" "artifacts/${{ env.PRODUCT_NAME }}.app/Contents/MacOS/"
          
          # Copy Info.plist
          cp "WindowSwitcher/Resources/Info.plist" "artifacts/${{ env.PRODUCT_NAME }}.app/Contents/"
          
          # Create PkgInfo
          echo -n "APPL????" > "artifacts/${{ env.PRODUCT_NAME }}.app/Contents/PkgInfo"
          
          # Update Info.plist with correct executable name
          /usr/libexec/PlistBuddy -c "Set :CFBundleExecutable ${{ env.PRODUCT_NAME }}" "artifacts/${{ env.PRODUCT_NAME }}.app/Contents/Info.plist" || true
      
      - name: Sign App (Ad-hoc)
        run: |
          codesign --force --deep --sign - "artifacts/${{ env.PRODUCT_NAME }}.app"
      
      - name: Create DMG
        run: |
          # Install create-dmg
          brew install create-dmg || true
          
          # Create DMG
          create-dmg \
            --volname "${{ env.PRODUCT_NAME }}" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "${{ env.PRODUCT_NAME }}.app" 150 185 \
            --hide-extension "${{ env.PRODUCT_NAME }}.app" \
            --app-drop-link 450 185 \
            "artifacts/${{ env.PRODUCT_NAME }}.dmg" \
            "artifacts/${{ env.PRODUCT_NAME }}.app" || true
          
          # Fallback: create simple DMG if create-dmg fails
          if [ ! -f "artifacts/${{ env.PRODUCT_NAME }}.dmg" ]; then
            hdiutil create -volname "${{ env.PRODUCT_NAME }}" \
              -srcfolder "artifacts/${{ env.PRODUCT_NAME }}.app" \
              -ov -format UDZO \
              "artifacts/${{ env.PRODUCT_NAME }}.dmg"
          fi
      
      - name: Create ZIP Archive
        run: |
          cd artifacts
          zip -r "${{ env.PRODUCT_NAME }}.zip" "${{ env.PRODUCT_NAME }}.app"
      
      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PRODUCT_NAME }}-app
          path: artifacts/${{ env.PRODUCT_NAME }}.app
          retention-days: 30
      
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PRODUCT_NAME }}-dmg
          path: artifacts/${{ env.PRODUCT_NAME }}.dmg
          retention-days: 30
      
      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PRODUCT_NAME }}-zip
          path: artifacts/${{ env.PRODUCT_NAME }}.zip
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      contents: write
    
    steps:
      - name: Download DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PRODUCT_NAME }}-dmg
          path: artifacts
      
      - name: Download ZIP artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PRODUCT_NAME }}-zip
          path: artifacts
      
      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release v${{ steps.version.outputs.VERSION }}
          body: |
            ## WindowSwitcher v${{ steps.version.outputs.VERSION }}
            
            ### Downloads
            - **DMG**: For easy installation (drag to Applications)
            - **ZIP**: Portable version
            
            ### System Requirements
            - macOS 14.0 or later
            - Apple Silicon or Intel Mac
            
            ### Installation
            1. Download the DMG file
            2. Open the DMG
            3. Drag WindowSwitcher to Applications
            4. Grant Accessibility permission when prompted
          files: |
            artifacts/${{ env.PRODUCT_NAME }}.dmg
            artifacts/${{ env.PRODUCT_NAME }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
